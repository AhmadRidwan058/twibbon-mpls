<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Twibbon MPLS SDN Babakan Asem 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Generator Twibbon MPLS</h1>
            <p>SDN Babakan Asem 2</p>
        </header>

        <div class="content-wrapper">
            <div class="canvas-panel">
                <!-- Area Canvas -->
                <canvas id="twibbon-canvas" width="500" height="500"></canvas>
            </div>

            <div class="control-panel">
                <h2>Unggah Foto Anda</h2>
                <div class="file-upload-box">
                    <label for="upload-foto" class="upload-label">
                        <span id="upload-status">Pilih Foto</span>
                    </label>
                    <input type="file" id="upload-foto" accept="image/*">
                </div>

                <!-- Slider Zoom (Awalnya Disembunyikan) -->
                <div class="zoom-control" id="zoom-container" style="display: none;">
                    <label for="zoom-slider">Atur Ukuran Foto:</label>
                    <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
                </div>

                <p class="instr">Sesuaikan posisi foto Anda (seret) dan ukurannya dengan slider di atas.</p>
                <button id="download-btn" disabled>Unduh Twibbon</button>
            </div>
        </div>
    </div>

    <!-- Panggil Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <!-- Panggil script logika -->
    <script src="script.js"></script>
</body>
</html>
